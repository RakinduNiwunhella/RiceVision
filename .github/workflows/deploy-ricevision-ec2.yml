name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'ricevision-pipeline/**'
      - '.github/workflows/deploy-ricevision-ec2.yml'  # optional (trigger on workflow edits)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            set -x

            echo "Connected to EC2"

            cd /home/ec2-user/app/RiceVision || exit

            echo "Current directory:"
            pwd
            ls -la

            echo "Running deploy script..."
            chmod +x deploy.sh
            ./deploy.sh

            echo "Deployment finished"