name: Backend CI (RV-38)

on:
  pull_request:
    branches: [ RV-38 ]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Back-End/SDGP/requirements.txt

      - name: Check Syntax
        run: python -m compileall Back-End/SDGP
