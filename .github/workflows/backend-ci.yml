name: Backend CI (RV-38)

on:
  pull_request:
    branches:
      - RV-38*

jobs:
  test-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Back-End/SDGP/requirements.txt

      - name: Check Syntax
        run: python -m compileall Back-End/SDGP
