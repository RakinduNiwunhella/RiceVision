project:
  name: ricevision_inference_pipeline
  version: 1.0.0

stage_mapping:
  Transplant: 0
  Vegetative: 1
  Reproductive: 2
  Ripening: 3
  Harvest: 4

final_target_columns:
  - pixel_id
  - year
  - date
  - month
  - season
  - season_id
  - cycle_id
  - district
  - district_id
  - lat
  - lon
  - elevation
  - slope
  - rain_1d_mean
  - rain_3d_mean
  - rain_7d_mean
  - rain_14d_mean
  - rain_30d_mean
  - tmean_mean
  - tmax_mean
  - tmin_mean
  - t_day_mean
  - t_night_mean
  - rh_mean_mean
  - ten_day_start
  - delta_days
  - doy
  - doy_sin
  - doy_cos
  - ndvi_median_smooth
  - evi_median_smooth
  - evi2_median_smooth
  - lswi_median_smooth
  - ndwi_median_smooth
  - gli_median_smooth
  - gci_median_smooth
  - cvi_median_smooth
  - sipi_median_smooth
  - rendvi_median_smooth
  - reci_median_smooth
  - ccci_median_smooth
  - s2rep_median_smooth
  - bsi_median_smooth
  - npcri_median_smooth
  - ndsmi_median_smooth
  - ndvi_vel
  - lswi_vel
  - bsi_vel
  - stage_name
  - stage
  - ndvi_zscore
  - ndvi_vel_z
  - bsi_z
  - lswi_vel_z
  - cpi
  - hazard_drought
  - hazard_flood
  - hazard_heavy_rain
  - hazard_landslide
  - hazard_lightning
  - hazard_wind

paths:
  input_csv: data/raw/merged_combined_satellite.csv
  artifacts_dir: artifacts
  preprocessed_output: artifacts/inference_p1.csv
  coords_lookup_csv: artifacts/unique_coordinates.csv
  paddy_points_plot: artifacts/paddy_points_distribution.png
  engineered_csv: artifacts/inference_preprocess_engineered.csv
  aggregate_10day_csv: artifacts/inference_preprocess_10day.csv
  bilstm_lstm_frame_csv: artifacts/bilstm_lstm_frame.csv
  bilstm_scaled_frame_csv: artifacts/bilstm_scaled_frame.csv
  bilstm_prepared_csv: artifacts/Inference_preprocessed.csv
  bilstm_results_csv: artifacts/lstm_results.csv
  district_report_csv: artifacts/district_report.csv
  trend_report_csv: artifacts/trend_report.csv
  forecast_report_csv: artifacts/forecast_report.csv
  yield_master_csv: artifacts/yield_master_z.csv
  final_yield_report_csv: artifacts/Sri_Lanka_2026_Final_Report.csv

models:
  district_encoder: pipelines/encoders/district_encoder.joblib
  lstm_scaler: scalers/lstm_scaler.joblib
  bilstm_model: models/ricevision_v7_district_aware.keras
  pca_model: models/pca_model/rice_yield_pca_v7.pkl
  yield_scaler: scalers/yield_scaler.pkl
  yield_model: models/rice_yield_model_final.pkl

baselines:
  district_baseline: data/baselines/sri_lanka_district_baselines.csv
  yield_baseline: data/baselines/yield_baselines.csv

preprocessing:
  bands: [B1, B2, B3, B4, B5, B6, B7, B8, B8A, B9, B11, B12]
  hazard_cols_upper:
    - hazard_DROUGHT
    - hazard_FLOOD
    - hazard_HEAVY_RAIN
    - hazard_LANDSLIDE
    - hazard_LIGHTNING
    - hazard_WIND
  hazard_cols_lower:
    - hazard_drought
    - hazard_flood
    - hazard_heavy_rain
    - hazard_landslide
    - hazard_lightning
    - hazard_wind
  clean_scl_classes: [4, 5, 6, 7]
  cloud_threshold: 50

bilstm:
  window_size: 10
  ts_features:
    - ndvi_median_smooth
    - lswi_median_smooth
    - evi_median_smooth
    - ndwi_median_smooth
    - bsi_median_smooth
    - ndvi_vel_z
    - lswi_vel_z
    - bsi_z
    - ndvi_zscore
    - rain_7d_mean
    - rain_14d_mean
    - tmean_mean
    - rh_mean_mean
    - delta_days
    - doy_sin
    - doy_cos
    - is_growing
    - hazard_drought
    - hazard_flood
    - hazard_heavy_rain
    - hazard_landslide
    - hazard_lightning
    - hazard_wind
    - flood_index
    - ndvi_delta
  static_features:
    - lat
    - lon
    - elevation
    - slope
    - season_id
    - doy_sin
    - doy_cos

aggregation:
  spectral_indices:
    - NDVI
    - EVI
    - EVI2
    - LSWI
    - NDWI
    - GLI
    - GCI
    - CVI
    - SIPI
    - RENDVI
    - RECI
    - CCCI
    - S2REP
    - BSI
    - NPCRI
    - NDSMI
  env_cols:
    - rain_1d
    - rain_3d
    - rain_7d
    - rain_14d
    - rain_30d
    - tmean
    - tmax
    - tmin
    - t_day
    - t_night
    - rh_mean
